name: 'MergeMeter'
description: 'Sends PR merge events to MergeMeter and posts a Change Confidence survey link as a PR comment.'
author: 'MergeMeter'

branding:
  icon: 'bar-chart-2'
  color: 'blue'

inputs:
  secret:
    description: >
      HMAC signing secret from your MergeMeter dashboard.
      Store this as a GitHub Actions organization secret (e.g. MERGEMETER_SECRET)
      so it is shared across all repositories in your organization automatically.
    required: true

  # Organization ID is derived automatically from the GitHub event payload.

  github-token:
    description: >
      GitHub token used to post the Change Confidence survey comment to the PR.
      Defaults to the built-in GITHUB_TOKEN — no configuration needed unless
      you want to use a PAT for cross-repository access.
    required: false
    default: ${{ github.token }}

  teams-token:
    description: >
      Optional PAT for fetching the GitHub teams associated with this repository.
      Requires a classic PAT with the read:org scope, or a fine-grained PAT with
      Organization Members (read) permission.
      The default GITHUB_TOKEN cannot read org-level team membership — this must
      be a separate secret if you want repo_teams populated in the ingest payload.
      When omitted, repo_teams will be an empty array.
    required: false

runs:
  using: 'node20'
  main: 'dist/index.js'
